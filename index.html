<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>色彩消除大挑战 - 预览版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style type="text/css">
        body {
            margin: 0;
            background-color: #000000;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-title {
            color: white;
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
            text-align: center;
        }

        #canvas-container {
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 9 / 16;
            margin: 0 auto;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading {
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="game-title">色彩消除大挑战 - 预览版</h1>
        <div id="canvas-container">
            <div class="loading">正在加载游戏...</div>
        </div>
    </div>

    <script type="text/javascript">
        // Godot Engine loading script
        const GODOT_CONFIG = {
            "canvas": {
                "id": "canvas"
            },
            "executable": "color_crush_challenge",
            "filesystem": true,
            "async": true,
            "threads": true,
            "audio": {
                "sampleRate": 44100,
                "margin": 200
            }
        };

        const engine = new Engine(GODOT_CONFIG);

        function loadGame() {
            const container = document.getElementById('canvas-container');
            const loadingDiv = container.querySelector('.loading');

            // 创建canvas元素
            const canvas = document.createElement('canvas');
            canvas.id = 'canvas';
            canvas.tabIndex = 0;

            // 替换loading div
            container.replaceChild(canvas, loadingDiv);

            // 启动游戏引擎
            engine.startGame();
        }

        // 页面加载完成后启动游戏
        window.addEventListener('load', function() {
            if(typeof Engine !== 'undefined') {
                loadGame();
            } else {
                // 如果引擎脚本未加载，则动态加载
                const script = document.createElement('script');
                script.src = 'godot.js'; // Godot导出的JavaScript文件
                script.onload = function() {
                    loadGame();
                };
                document.head.appendChild(script);
            }
        });
    </script>
</body>
</html>
