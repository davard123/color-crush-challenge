name: Deploy Godot Game to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v3

    - name: Setup Godot
      uses: chickensoft-space/setup-godot@v2
      with:
        godot-version: 3.5.2
        export-templates: true

    - name: Setup Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'

    - name: Export Game
      run: |
        godot --export "HTML5" ./export/index.html --no-window
        echo "Game exported successfully"

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v1
      with:
        path: ./export/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2